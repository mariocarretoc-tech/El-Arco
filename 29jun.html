<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abarrotes El Arco</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#361076;
    color:white;
    text-align:center;
    padding:20px;
}

.product-img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
    display:block;
}


header h1{
    margin-bottom:10px;
}

.search-box{
    max-width:500px;
    margin:auto;
}

.search-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.container{
    display:flex;
    flex-direction:column;
    gap:15px;
    padding:15px;
}

@media(min-width:900px){

    .container{
        display:grid;
        grid-template-columns:220px 1fr 300px;
    }

}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.category-btn{
    width:100%;
    border:none;
    padding:12px;
    margin-bottom:8px;
    cursor:pointer;
    border-radius:8px;
//    background:#361076;
//    background:#e5e7eb;
    font-size:15px;
}

.active{
    background:#361076;
    color:white;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

.product{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.image{
    height:120px;
    background:#e5e5e5;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    margin-bottom:10px;
}

.price{
    color:#16a34a;
    font-weight:bold;
    margin:10px 0;
}

.add-btn{
    width:100%;
    border:none;
    background:#361076;
    color:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.cart-item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

.qty-btn{
    border:none;
    color:white;
    width:28px;
    height:28px;
    cursor:pointer;
    border-radius:4px;
}

.plus{
    background:#361076;
}

.minus{
    background:#dc2626;
}

.total{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.whatsapp-btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
// background:#25D366;    
    background:#361076;
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.floating-whatsapp{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#361076;
    // background:#25D366;
    color:white;
    font-size:32px;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
}

</style>
</head>

<body>

<header>
    <h1>🏪 Abarrotes El Arco</h1>

    <div class="search-box">
        <input
            type="text"
            id="search"
            placeholder="Buscar productos..."
            onkeyup="renderProducts()">
    </div>

</header>

<div class="container">

    <div class="card">

        <h3>Categorías</h3>
        <br>

        <button class="category-btn active"
        onclick="selectCategory('Todos',this)">Todos</button>

        <button class="category-btn"
        onclick="selectCategory('Granos',this)">Granos</button>

        <button class="category-btn"
        onclick="selectCategory('Despensa',this)">Despensa</button>

        <button class="category-btn"
        onclick="selectCategory('Lácteos',this)">Lácteos</button>

        <button class="category-btn"
        onclick="selectCategory('Bebidas',this)">Bebidas</button>

    </div>

    <div>
        <div id="products" class="products"></div>
    </div>

    <div class="card">

        <h3>🛒 Carrito</h3>

        <div id="cart"></div>

        <div class="total">
            Total: $<span id="total">0.00</span>
        </div>

        <button class="whatsapp-btn"
        onclick="sendOrder()">

        Enviar Pedido por WhatsApp

        </button>

    </div>

</div>

<a
href="https://wa.me/5212221234567"
class="floating-whatsapp"
target="_blank">
💬
</a>

<script>

const whatsappNumber = "5212221234567";

const products = [

{id:1,name:"1-2-3 - Líquido MAXI PODER 4.65 L",price:149,category:"Granos",image:"https://github.com/mariocarretoc-tech/images/blob/1ab688a377233d0e9c69fbdb18d88ec079a6b25f/1.png"},
{id:2,name:"Ace.Nutrioli 946ml",price:39,category:"Granos",image:"https://github.com/mariocarretoc-tech/images/blob/main/9.jpg"},
{id:3,name:"CETAPHIL Crema Hidratante 453 g Recomendada por Dermatólogos para Piel Sensible",price:199,category:"Despensa",image:"img/231.jpg"},
{id:4,name:"Aceite 1 Lt",price:48,category:"Despensa",icon:"🛢️"},
{id:5,name:"Leche 1 Lt",price:25,category:"Lácteos",icon:"🥛"},
{id:6,name:"Queso Oaxaca",price:85,category:"Lácteos",icon:"🧀"},
{id:7,name:"Refresco 2 Lt",price:42,category:"Bebidas",icon:"🥤"},
{id:8,name:"Agua 1.5 Lt",price:15,category:"Bebidas",icon:"💧"}

];

let cart = [];
let currentCategory = "Todos";

function selectCategory(category,btn){

    currentCategory=category;

    document
    .querySelectorAll(".category-btn")
    .forEach(x=>x.classList.remove("active"));

    btn.classList.add("active");

    renderProducts();
}

function renderProducts(){

    const search =
    document.getElementById("search")
    .value
    .toLowerCase();

    let filtered = products.filter(product=>{

        const categoryMatch =
        currentCategory==="Todos" ||
        product.category===currentCategory;

        const searchMatch =
        product.name.toLowerCase()
        .includes(search);

        return categoryMatch && searchMatch;

    });

    document.getElementById("products").innerHTML =

    filtered.map(product=>`

        <div class="product">

           <img
           	src="${product.image}"
        	alt="${product.name}"
        	class="product-img">

            <h4>${product.name}</h4>

            <div class="price">
                $${product.price}
            </div>

            <button
            class="add-btn"
            onclick="addCart(${product.id})">

            Agregar

            </button>

        </div>

    `).join("");

}

function addCart(id){

    let existing =
    cart.find(item=>item.id===id);

    if(existing){
        existing.qty++;
    }else{

        let product =
        products.find(p=>p.id===id);

        cart.push({
            ...product,
            qty:1
        });

    }

    renderCart();

}

function updateQty(id,value){

    cart = cart.map(item=>{

        if(item.id===id){
            item.qty += value;
        }

        return item;

    }).filter(item=>item.qty>0);

    renderCart();

}

function renderCart(){

    const cartDiv =
    document.getElementById("cart");

    cartDiv.innerHTML = cart.map(item=>`

        <div class="cart-item">

            <strong>${item.name}</strong><br>

            <button
            class="qty-btn minus"
            onclick="updateQty(${item.id},-1)">
            -
            </button>

            ${item.qty}

            <button
            class="qty-btn plus"
            onclick="updateQty(${item.id},1)">
            +
            </button>

            $${(item.price*item.qty).toFixed(2)}

        </div>

    `).join("");

    let total =
    cart.reduce(
        (sum,item)=>
        sum+(item.price*item.qty),
        0
    );

    document.getElementById("total")
    .innerText = total.toFixed(2);

}

function sendOrder(){

    if(cart.length===0){

        alert("Agrega productos al carrito");

        return;
    }

    let total = 0;

    let message =
    "🛒 PEDIDO DE ABARROTES%0A%0A";

    cart.forEach(item=>{

        let subtotal =
        item.price*item.qty;

        total += subtotal;

        message +=
        `✅ ${item.name} x${item.qty} - $${subtotal}%0A`;

    });

    message +=
    `%0A💰 TOTAL: $${total.toFixed(2)}`;

    const url =
    `https://wa.me/${whatsappNumber}?text=${message}`;

    window.open(url);

}

renderProducts();

</script>

</body>
</html>
