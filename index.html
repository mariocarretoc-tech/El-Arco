<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>El Arco</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:#001f54;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:60px;
height:60px;
border-radius:50%;
}

.cart-counter{
background:#2563eb;
padding:10px 15px;
border-radius:30px;
font-weight:bold;
}

.banner{
background:#2563eb;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

#buscador{
display:block;
width:90%;
max-width:500px;
margin:20px auto;
padding:10px;
border-radius:10px;
border:none;
}

.categorias{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;
}

.categorias button{
padding:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
padding:20px;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

.card button{
width:100%;
padding:10px;
margin-top:10px;
background:#2563eb;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.carrito{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.item-carrito{
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #334155;
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

.qty button{
padding:5px 10px;
}

.whatsapp{
width:100%;
padding:12px;
margin-top:20px;
border:none;
background:#25D366;
color:white;
border-radius:10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
}

@media(max-width:768px){
.container{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<header>

<div class="logo">
<img src="logo.png">
<h2>El Arco</h2>
</div>

<div class="cart-counter">
🛒 <span id="contadorCarrito">0</span>
</div>

</header>

<div class="banner">
🔥 Compra arriba de $500 y obtén envío gratis
</div>

<input
type="text"
id="buscador"
placeholder="Buscar producto...">

<div class="categorias" id="categorias"></div>

<div class="container">

<div class="productos" id="productos"></div>

<div class="carrito">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<h3>
Total: $
<span id="total">0</span>
</h3>

<button
class="whatsapp"
onclick="enviarWhatsapp()">
Enviar Pedido
</button>

</div>

</div>

<div class="modal" id="modal">
<img id="imgGrande">
</div>

<script>

let productos=[];
let carrito=[];

const numeroWhatsApp="5212221234567";

async function cargarProductos(){

const response=await fetch("productos.json");
productos=await response.json();

crearCategorias();
mostrarProductos(productos);

}

function crearCategorias(){

const categorias=[
"Todos",
...new Set(productos.map(p=>p.categoria))
];

const div=document.getElementById("categorias");

categorias.forEach(cat=>{

const btn=document.createElement("button");
btn.textContent=cat;

btn.onclick=()=>{

if(cat==="Todos"){
mostrarProductos(productos);
}else{
mostrarProductos(
productos.filter(
p=>p.categoria===cat
)
);
}

};

div.appendChild(btn);

});

}

function mostrarProductos(lista){

const cont=document.getElementById("productos");

cont.innerHTML="";

lista.forEach(producto=>{

cont.innerHTML+=`
<div class="card">

<h3>${producto.nombre}</h3>
<p>$${producto.precio}</p>
<img
src="${producto.imagen}"
onclick="ampliarImagen('${producto.imagen}')nclick="agregarCarrito(${producto.id})">
Agregar
</button>

</div>
`;

});

}

function agregarCarrito(id){

let item=
carrito.find(i=>i.id===id);

if(item){
item.cantidad++;
}else{

const producto=
productos.find(
p=>p.id===id
);

carrito.push({
...producto,
cantidad:1
});

}

actualizarCarrito();

}

function actualizarCarrito(){

let html="";
let total=0;
let contador=0;

carrito.forEach(item=>{

total+=item.precio*item.cantidad;

contador+=item.cantidad;

html+=`
<div class="item-carrito">

${item.nombre}

<div class="qty">

<button onclick="restar(${item.id})">
-
</button>

${item.cantidad}

<button onclick="sumar(${item.id})">
+
</button>

</div>

</div>
`;

});

document.getElementById("listaCarrito").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("contadorCarrito").innerText=contador;

}

function sumar(id){

carrito.find(
p=>p.id===id
).cantidad++;

actualizarCarrito();

}

function restar(id){

const item=
carrito.find(
p=>p.id===id
);

item.cantidad--;

if(item.cantidad<=0){

carrito=
carrito.filter(
p=>p.id!==id
);

}

actualizarCarrito();

}

function ampliarImagen(src){

document.getElementById(
"imgGrande"
).src=src;

document.getElementById(
"modal"
).style.display="flex";

}

document
.getElementById("modal")
.onclick=()=>{

document
.getElementById("modal")
.style.display="none";

};

function enviarWhatsapp(){

let mensaje=
"Hola, deseo realizar el siguiente pedido:%0A%0A";

let total=0;

carrito.forEach(item=>{

let subtotal=
item.precio*item.cantidad;

total+=subtotal;

mensaje+=
`${item.nombre} x${item.cantidad} = $${subtotal}%0A`;

});

mensaje+=`%0ATotal: $${total}`;

window.open(
`https://wa.me/${numeroWhatsApp}?text=${mensaje}`
);

}

document
.getElementById("buscador")
.addEventListener("keyup",e=>{

const texto=
e.target.value.toLowerCase();

mostrarProductos(

productos.filter(p=>
p.nombre
.toLowerCase()
.includes(texto)
)

);

});

cargarProductos();

</script>

</body>
</html>
