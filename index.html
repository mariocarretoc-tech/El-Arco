<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abarrotes - El Arco</title>
<link rel="stylesheet" href="/CSS/estilos.css">
</head>

<body>
	<!-- Encabezado -->
	<header>
		<div class="header-container">
			<div class="logo">
				<h1>🛒 El Arco</h1>
			</div>
			<div class="nav-controls">
				<span class="cart-btn" id="cart-counter" onclick="abrirCarrito()">Mi
					Carrito(0)</span>
			</div>
		</div>
	</header>

	<!-- Banner promocional -->
	<section class="hero">
		<h2>Catálogo de Productos</h2>
		<p>Selecciona tus productos y envía a nuestro WhatsApp.</p>
	</section>

	<!-- Barra de Búsqueda Integrada -->
	<section class="search-container">
		<div class="search-wrapper">
			<input type="text" id="search-input"
				placeholder="🔍 Buscar producto..." oninput="buscarProducto()"
				class="search-input">
		</div>
	</section>

	<section class="categories" id="categories-container"></section>

	<!-- Cuadrícula de Productos -->
	<main class="products-section">
		<div class="products-grid" id="products-grid-container">
			<!-- Inyección por JS -->
		</div>
	</main>

	<!-- Carrito Flotante -->
	<div class="cart-modal" id="cartModal">
		<div class="cart-content">
			<span class="close-cart" onclick="cerrarCarrito()">&times;</span>
			<h2 class="cart-title">Tu Carrito de Compras</h2>
			<div id="cart-items-container"></div>
			<div class="cart-total-section">
				Total: $<span id="cart-total-price">0.00</span>
			</div>
			<button class="checkout-btn" onclick="procesarCompra()">Proceder
				al Pago (WhatsApp)</button>
		</div>
	</div>

	<footer>
		<p>&copy; 2026 Abarrotes El Arco. Todos los derechos reservados.</p>
	</footer>

	<script type="text/javascript">
	
        let categoriaActual = "Todos";
        let textoBusqueda = "";
		let productosInventario = [];
        let carrito = [];
       
     // Carga los datos de forma asíncrona desde el archivo JSON externo o LocalStorage
        async function inicializarCatalogo() {
            try {
                const datosLocales = localStorage.getItem('inventario_tienda');
                
                if (datosLocales) {
                    productosInventario = JSON.parse(datosLocales);
                } else {
                    const respuesta = await fetch('productos.json');
                    if (!respuesta.ok) throw new Error('No se pudo leer el archivo productos.json');
                    productosInventario = await respuesta.json();
                }
                
                generarCategoriasDinamicas();
                cargarProductos("Todos");
            } catch (error) {
                console.error("Error al cargar el catálogo:", error);
                document.getElementById('products-grid-container').innerHTML = `
                    <p style="grid-column: 1/-1; text-align: center; padding: 2rem; color: red; font-weight: bold;">
                        Error al cargar los productos. Asegúrate de que el archivo productos.json exista y de ejecutar la página desde un entorno de servidor web local.
                    </p>
                `;
            }
        }        

        function generarCategoriasDinamicas() {
            const container = document.getElementById('categories-container');
            if (!container) return;

            // Extraemos todos los departamentos eliminando duplicados mediante un 'Set'
            const departamentosUnicos = [...new Set(productosInventario.map(p => p.departamento))];
            
            // Filtramos valores vacíos por si acaso
            const departamentosFiltrados = departamentosUnicos.filter(dept => dept && dept.trim() !== "");

            // Ordenamos alfabéticamente para que se vea estético
            departamentosFiltrados.sort();

            // Insertamos siempre el botón de "Todos" al principio
            let HTMLBotones = `<button class="cat-btn active" onclick="filtrarCategoria('Todos', this)">Todos</button>`;

            // Creamos un botón para cada departamento encontrado
            departamentosFiltrados.forEach(dept => {
                HTMLBotones += `<button class="cat-btn" onclick="filtrarCategoria('${dept}', this)">${dept}</button>`;
            });

            container.innerHTML = HTMLBotones;
        }

        function buscarProducto() {
            const input = document.getElementById('search-input');
            textoBusqueda = input.value.toLowerCase().trim();
            cargarProductos(categoriaActual);
        }

        function cargarProductos(categoriaSeleccionada = "Todos") {
           
            categoriaActual = categoriaSeleccionada;
            const grid = document.getElementById('products-grid-container');
            if(!grid) return;
            grid.innerHTML = ""; 

            let productosFiltrados = categoriaSeleccionada === "Todos" 
                ? productosInventario 
                : productosInventario.filter(p => p.departamento === categoriaSeleccionada);

            if (textoBusqueda !== "") {
                productosFiltrados = productosFiltrados.filter(p => 
                    p.descripcion.toLowerCase().includes(textoBusqueda)
                );
            }

            if (productosFiltrados.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem 1rem;">
                        <p style="font-size: 1.2rem; font-weight: 500;">No encontramos productos que coincidan con tu búsqueda.</p>
                    </div>
                `;
                return;
            }

            productosFiltrados.forEach((prod) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${prod.imagen || 'https://via.placeholder.com/300x180?text=Sin+Foto'}" alt="${prod.descripcion}" class="product-img" onerror="this.src='https://via.placeholder.com/300x180?text=Sin+Foto'">
                        
                        <div class="product-info">
                            <span class="product-badge">${prod.departamento}</span>
                            <h3 class="product-title">${prod.descripcion}</h3>
                            <p class="product-price">$${Number(prod.precio).toFixed(2)}</p>
                            <button class="add-to-cart" onclick="agregarAlCarrito('${prod.descripcion}', ${prod.precio})">Agregar al carrito</button>
                        </div>
                    </div>
                `;
            });
        }
        
        // --- SISTEMA DEL CARRITO DE COMPRAS ---
        function filtrarCategoria(categoria, boton) {
            const botones = document.querySelectorAll('.cat-btn');
            botones.forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');
            cargarProductos(categoria);
        }

        function agregarAlCarrito(nombre, precio) {
            const productoExistente = carrito.find(item => item.nombre === nombre);
            if (productoExistente) { productoExistente.cantidad++; } 
            else { carrito.push({ nombre: nombre, precio: precio, cantidad: 1 }); }
            actualizarInterfaz();
        }

        function cambiarCantidad(nombre, cambio) {
            const producto = carrito.find(item => item.nombre === nombre);
            if (producto) {
                producto.cantidad += cambio;
                if (producto.cantidad <= 0) {
                    carrito = carrito.filter(item => item.nombre !== nombre);
                }
            }
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const totalItems = carrito.reduce((acumulador, item) => acumulador + item.cantidad, 0);
            document.getElementById('cart-counter').innerText = `Mi Carrito (${totalItems})`;

            const container = document.getElementById('cart-items-container');
            container.innerHTML = ""; 

            if (carrito.length === 0) {
                container.innerHTML = '<p class="empty-message">Tu carrito está vacío.</p>';
            } else {
                carrito.forEach(item => {
                    container.innerHTML += `
                        <div class="cart-item">
                            <div class="item-details">
                                <h4>${item.nombre}</h4>
                                <p>$${item.precio.toFixed(2)} c/u - Total: $${(item.precio * item.cantidad).toFixed(2)}</p>
                            </div>
                            <div class="quantity-controls">
                                <button onclick="cambiarCantidad('${item.nombre}', -1)">-</button>
                                <span>${item.cantidad}</span>
                                <button onclick="cambiarCantidad('${item.nombre}', 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            }

            const granTotal = carrito.reduce((acumulador, item) => acumulador + (item.precio * item.cantidad), 0);
            document.getElementById('cart-total-price').innerText = granTotal.toFixed(2);
        }

        function abrirCarrito() { document.getElementById('cartModal').style.display = 'flex'; }
        function cerrarCarrito() { document.getElementById('cartModal').style.display = 'none'; }

        function procesarCompra() {
            if (carrito.length === 0) return;
            const numeroTelefono = "528148226556"; // Reemplaza por tu WhatsApp real
            let mensaje = "🛒 *NUEVO PEDIDO - ABARROTES EL ARCO*\n\n";
            carrito.forEach(item => {
                mensaje += `• *${item.nombre}*\n  Cantidad: ${item.cantidad} x $${item.precio.toFixed(2)} = *$${(item.precio * item.cantidad).toFixed(2)}*\n\n`;
            });
            const granTotal = carrito.reduce((acumulador, item) => acumulador + (item.precio * item.cantidad), 0);
            mensaje += `--------------------------------------\n💰 *TOTAL A PAGAR: $${granTotal.toFixed(2)}*`;
            window.open(`https://wa.me/${numeroTelefono}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

     // Evento que inicia la carga de manera estructurada una vez listo el DOM
        document.addEventListener("DOMContentLoaded", () => {
            inicializarCatalogo();
        });        
    </script>
</body>
</html>
